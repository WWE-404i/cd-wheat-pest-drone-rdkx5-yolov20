model_parameters:
  march: "bayes-e"
  layer_out_dump: false
  remove_node_type: "Quantize;Transpose;Dequantize;Cast;Reshape;Softmax;DequantizeFilter"
  set_node_data_type: {}
  working_dir: "./export_v5"
  onnx_model: "./runs/wheat_7class_v5/weights/best.onnx"
  output_model_file_prefix: "wheat_7class_v5"

input_parameters:
  input_name: "images"
  input_shape: "1x3x640x640"
  input_type_train: "rgb"
  input_layout_train: "NCHW"
  input_type_rt: "rgb"
  input_layout_rt: "NCHW"
  norm_type: "data_scale"
  mean_value: 0.0
  scale_value: 0.003921568627
  input_space_and_range: "regular"

calibration_parameters:
  cal_data_dir: "./calib_clean"
  cal_data_type: "uint8"
  calibration_type: "default"
  optimization: "run_fast"
  per_channel: false
  preprocess_on: true
  run_on_bpu: ""
  run_on_cpu: ""

compiler_parameters:
  compile_mode: "latency"
  core_num: 1
  debug: false
  jobs: 0
  max_time_per_fc: 0
  optimize_level: "O3"
